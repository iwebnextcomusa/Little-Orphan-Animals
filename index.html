<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iWebNext</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Little Orphan Animals is a nonprofit sanctuary dedicated to rescuing and providing lifelong love, care, and peaceful shelter to abandoned, neglected, and special-needs animals." />
    <meta name="keywords" content="animal rescue, nonprofit, animal sanctuary, foster animals, donate to animals, Little Orphan Animals, Nancy Nenad, pet rescue" />
    <meta name="author" content="iWebNext" />

    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Little Orphan Animals - Lifelong Sanctuary and Rescue" />
    <meta property="og:description" content="Dedicated to rescuing abandoned, abused, and orphaned animals, providing a safe lifelong sanctuary where they live in dignity." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&q=80&w=1200" />
    <meta property="og:url" content="https://iwebnext.com" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Little Orphan Animals - Lifelong Sanctuary" />
    <meta name="twitter:description" content="Providing love, care, medical attention, and sanctuary to animals in need." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&q=80&w=1200" />

    <!-- Structured Data (Schema.org) for NGO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "NGO",
        "name": "Little Orphan Animals",
        "founder": "Nancy Nenad",
        "description": "Little Orphan Animals is a nonprofit organization dedicated to rescuing abandoned, abused, neglected, and orphaned animals by providing them with a safe, lifelong sanctuary.",
        "url": "https://iwebnext.com",
        "logo": "https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&q=80&w=200",
        "sameAs": [
          "https://facebook.com/littleorphananimals",
          "https://instagram.com/littleorphananimals"
        ]
      }
    </script>
  </head>
  <body class="bg-[#faf8f5] text-stone-800 selection:bg-emerald-200 selection:text-emerald-900 overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
